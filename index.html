<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exclusion Zone Mapping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <div class="ribbon">
          <div>Exclusion Zone Map</div>
          <div class="ribbon-subtitle">As of 07-07-2026</div>
        </div>
      </header>

      <main class="map-stage">
        <div class="map-toolbar">
          <button id="toggleToolbar" class="toolbar-collapse-toggle" type="button" aria-expanded="true">Collapse</button>
          <div class="toolbar-controls">
            <button class="tool-button active" data-tool="pan" type="button">Pan</button>
            <button class="tool-button" data-tool="line" type="button">Line</button>
            <button class="tool-button" data-tool="rect" type="button">Square</button>
            <button class="tool-button" data-tool="circle" type="button">Circle</button>
            <button class="tool-button" data-tool="arrow" type="button">Arrow</button>
            <button class="tool-button" data-tool="pen" type="button">Freehand</button>
            <button class="tool-button" data-tool="text" type="button">Text Box</button>
            <button class="tool-button" data-tool="place-marker" type="button">Add Marker</button>
            <label class="color-picker-control" for="shapeColorPicker">
              <span>Color</span>
              <input id="shapeColorPicker" type="color" value="#00d9ff" />
            </label>
            <button id="undoShape" type="button">Undo</button>
            <button id="redoShape" type="button">Redo</button>
            <button id="zoomIn" type="button" aria-label="Zoom in">+</button>
            <button id="zoomOut" type="button" aria-label="Zoom out">−</button>
            <button id="resetView" type="button">Reset</button>
          </div>
        </div>

        <aside id="poiPanel" class="poi-panel">
          <div class="poi-panel-header">
            <button id="togglePoiPanel" class="poi-panel-toggle" type="button" aria-expanded="true">▾ POIs</button>
            <label class="toggle-all">
              <input id="toggleAllPois" type="checkbox" checked />
              <span>Show all</span>
            </label>
          </div>
          <div id="poiList" class="poi-list"></div>
        </aside>

        <div id="mapViewport" class="map-viewport">
          <div id="mapLayer" class="map-layer">
            <img id="mapImage" src="Mapp.png" alt="Exclusion zone map" draggable="false" />
            <div id="poiMarkers"></div>
            <svg id="annotationLayer" class="annotation-layer" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <div id="hoverLabel" class="hover-label"></div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
